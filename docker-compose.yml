services:
  # 1) Base de datos
  db:
    image: postgres:16-alpine
    container_name: ecom-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ecom
      POSTGRES_PASSWORD: ecom123
      POSTGRES_DB: tienda
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks: [ecom-net]

  # 2) Cache / carrito
  redis:
    image: redis:7-alpine
    container_name: ecom-redis
    restart: unless-stopped
    networks: [ecom-net]

  # 3) Servicio de correos (SMTP de prueba + interfaz web)
  mail:
    image: mailhog/mailhog:latest
    container_name: ecom-mail
    restart: unless-stopped
    # UI web de MailHog en el puerto 8025 (interno)
    networks: [ecom-net]

  # 4) API / Backend
  api:
    build: ./api
    container_name: ecom-api
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: db
      DB_USER: ecom
      DB_PASSWORD: ecom123
      DB_NAME: tienda
      REDIS_HOST: redis
      SMTP_HOST: mail
      SMTP_PORT: 1025
    depends_on: [db, redis, mail]
    networks: [ecom-net]

  # 5) Frontend web (Nginx sirve la tienda y hace proxy a la API)
  web:
    image: nginx:alpine
    container_name: ecom-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [api, mail]
    networks: [ecom-net]

volumes:
  db_data:

networks:
  ecom-net:
    driver: bridge
